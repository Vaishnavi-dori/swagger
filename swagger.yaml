components:
  schemas:
    EchoRsp:
      type: object
      properties:
        name:
          type: string
          description: Application name
        version:
          type: string
          description: Application version
        buildTag:
          type: string
          description: Application build tag
        buildBranch:
          type: string
          description: Application build branch
        status:
          type: string
          description: Echo status
      description: Echo response.
    loginEmail:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
          description: Email address of the account.
        password:
          type: string
          description: Password associated with the account.
      description: Email/password authentication
    DashboardAddUserReq:
      required:
      - user
      type: object
      properties:
        user:
          $ref: '#/components/schemas/user'
      description: Request parameters for adding a user
    DashboardLoginRsp:
      required:
      - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/statusV3'
        user:
          $ref: '#/components/schemas/user'
      description: Response parameters.
    ListCompanysRsp:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/statusV3'
        companies:
          type: array
          items:
            $ref: '#/components/schemas/company'
      description: List Company response.
    statusV3:
      type: object
      properties:
        state:
          type: string
          description: Indicates the state of the request. Supported values are -
            PENDING, COMPLETE, FAILED. PENDING = request processing in progress; COMPLETE
            = request processing is complete; FAILED = request processing failed -
            see statusMessage for exact failure.
          example: PENDING
        requestId:
          type: string
          description: Unique ID assigned to each API request. Used for internal logging.
            (GUID)
        statusMessage:
          type: string
          description: Details of the status
      description: Generic status returned by every API call.
    company:
      type: object
      properties:
        id:
          type: integer
          description: Company Id
        name:
          type: string
          description: Company name used internally
        displayName:
          type: string
          description: Company name used for displaying
        uxConfig:
          type: string
          description: Internal field used for UI
        lastRun:
          type: integer
          description: Unused field
          format: int64
        serviceBundleIds:
          type: array
          description: List of available service bundles for the company
          items:
            type: integer
      description: Company attributes
    MaintainCompanyReq:
      type: object
      properties:
        company:
          $ref: '#/components/schemas/company'
        serviceBundleIds:
          type: array
          description: ServiceBundleIds to be associated with the company
          items:
            type: integer
      description: Request parameters.
    MaintainCompanyRsp:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/statusV3'
        companies:
          type: array
          items:
            $ref: '#/components/schemas/company'
      description: Maintain Company response.
    v2DeleteRsp:
      required:
      - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/statusV3'
      description: Response parameters.
    MaintainMlcReq:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/statusV3'
        mlc:
          $ref: '#/components/schemas/mlc'
      description: MLC Request parameters.    
