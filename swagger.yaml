      type: object
      properties:
        data:
          type: string
          description: JSON data structure returned as a string.
      description: Generic JSON structure. Data passed in this field is specific to
        the serviceId passed in the request and can be referenced by (key, value)
        pairs.
    fileDef:
      required:
      - fileFormat
      - fileType
      type: object
      properties:
        fileType:
          type: string
          description: File type of the file. Based on what is passed here, the corresponding
            file* field will be included in the request or response. Supported values
            are - fileUri, fileBase64, fileJson. If fileUri is passed, then fileBase64
            and fileJson will not exist. If fileBase64 or fileJson is passed, then
            fileUri may also be present based on the operation performed (i.e. for
            download_file, both the fileUri and fileBase64 would be passed in the
            response structure).
          example: fileUri
        fileFormat:
          type: string
          description: Format of the file data specified as a MIME type. Other formats
            will be supported as needed. Supported values are - application/json,
            audio/wav, image/png, image/jpg, image/jpeg, image/bmp, video/mp4, raw.
          example: image/png
        fileSize:
          type: integer
          description: Size of the file data in bytes.
          format: int64
        fileUri:
          type: string
          description: URI of file location.
        fileBase64:
          type: string
          description: File data encoded as a string of base64 characters.
        fileJson:
          type: string
          description: File data is a JSON string.
          example: '{"id": "1234", "key": "value"}'
      description: File data - parsing of this data structure is dependent on the
        fileType field.
    timevalue:
      type: object
      properties:
        timevalue:
          type: integer
          description: Timestamp as a number of seconds since Jan 01, 1970 00:00:00
            UTC.
          format: int64
      description: Generic timestamp.
