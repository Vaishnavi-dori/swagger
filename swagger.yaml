openapi: 3.0.1
info:
  title: Dori AI Vision Interface
  description: REST API specification for interfacing between Dori AI Vision frontend
    and backend.
  version: 3.0.0
servers:
- url: http://localhost:8989/v1
- url: https://localhost:8989/v1
tags:
- name: user
  description: User methods
- name: application
  description: Application methods
- name: common
  description: Common methods
- name: credentials
  description: Credentials methods
- name: project
  description: Project methods
- name: target
  description: Job Target methods
- name: infrastructure
  description: Infrastructure methods
- name: jobs
  description: Job methods
- name: model
  description: Model methods
- name: dataset
  description: Dataset methods
- name: clove
