          type: string
          description: Model input class - i.e. mix, image, video, raw data (int,
            byte, float, string, etc)
        outputType:
          type: string
          description: Model output class - i.e. mix, image, video, raw data (int,
            byte, float, string, etc)
        inputFormat:
          type: integer
          description: Format of annotation file.
          format: int32
        modelProtoFilename:
          type: string
          description: Name of actual model file within the model archive file.
        modelArchivePath:
          type: string
          description: Location of actual model file within the model archive file
            from root of archive.
        modelLabelFile:
          type: string
          description: Location of model label file within the model archive file
            from root of archive.
        modelArchitecture:
          type: string
          description: The architecture of the model.
        modelSize:
          type: integer
          format: int64
        numNodes:
          type: integer
          format: int32
        numLayers:
          type: integer
          format: int32
        numFlops:
          type: integer
          description: Number of flops
          format: int64
        weightPrecision:
          type: string
          description: Weight precision
        modelParentId:
          type: string
          description: Parent Model ID.
        inputHeight:
          type: integer
          description: Height (in pixels) of the expected image input (if applicable).
          format: int32
        inputWidth:
          type: integer
          description: Width (in pixels) of the expected image input (if applicable).
          format: int32
        inputLayerName:
          type: string
          description: Name of the first layer of the model..
        outputLayerName:
          type: string
          description: Name of the last layer of the model.
        normalizationMean:
          type: number
          format: float
        normalizationStd:
          type: number
          format: float
      description: Generic info structure for a given model used by MLC.
    modelMetadata:
      required:
      - desc
      - modelArchivePath
      - modelFramework
      - modelProtoFilename
      - name
      type: object
      properties:
        sdkVersion:
          type: string
          description: Dori SDK version that is being used to upload the model
          example: 1.0.0
        name:
          type: string
          description: Client defined string to uniquely identify the model. 32 characters
            max, must be unique across the client's account.
        desc:
          type: string
          description: Client defined string to describe the model. 128 characters
            max.
        modelProtoFilename:
          type: string
          description: Filename of the model I/O protobuf. This file needs to be contained
            within the modelFile tar.gz file at the root.
        modelArchivePath:
          type: string
          description: Filename modelFile tar.gz file.
        modelVersion:
          type: string
          description: Model version.
        modelClass:
          type: string
          description: Model class - i.e. image classification, object detection,
            etc
        checksum:
          type: string
          description: SHA256 checksum of the .tar.gz/.zip file.
        inputHeight:
          type: integer
          description: Height (in pixels) of the expected image input (if applicable).
          format: int32
        inputWidth:
          type: integer
          description: Width (in pixels) of the expected image input (if applicable).
          format: int32
        inputLayerName:
          type: string
          description: Name of the first layer of the model..
        outputLayerName:
          type: string
          description: Name of the last layer of the model.
        modelLabelFile:
          type: string
          description: Location of model label file within the model archive file
            from root of archive.
        modelArchitecture:
          type: string
          description: The architecture of the model.
        normalizationMean:
          type: number
          format: float
        normalizationStd:
          type: number
          format: float
        dataSourceId:
          type: string
          description: Data source Id for the model
        modelApi:
          $ref: '#/components/schemas/modelApi'
        modelFramework:
          $ref: '#/components/schemas/modelFramework'
        modelRuntime:
          $ref: '#/components/schemas/modelRuntime'
        metadata:
          $ref: '#/components/schemas/metadataDef'
      description: Parameters required to describe the model upload.
    modelApi:
      required:
      - firstLayerName
      - input
      - lastLayerName
      - output
      - serviceApi
      type: object
      properties:
        serviceApi:
          $ref: '#/components/schemas/serviceApi'
        input:
          type: string
          description: Refers to a protobuf message in the model protobuf that acts
            as the input to the model.
        output:
          type: string
          description: Refers to a protobuf message in the model protobuf that acts
            as the output of the model.
        inputHeight:
          type: integer
          description: Height (in pixels) of the expected image input (if applicable).
          format: int32
        inputWidth:
          type: integer
          description: Width (in pixels) of the expected image input (if applicable).
          format: int32
        firstLayerName:
          type: string
          description: Name of the first layer of the model..
        lastLayerName:
          type: string
          description: Name of the last layer of the model.
      description: Describes the service API this model binds to and the input/output
        parameters for the model.
    modelFramework:
      type: object
      properties:
        framework:
          type: string
          description: Describes the model framework. Supported values are TF, TFLITE,
            COREML, CAFFE2. TF = Tensorflow, TFLITE = Tensorflow Lite, COREML = Core
            ML, CAFFE2 = Caffe 2.
          example: TFLITE
        version:
          type: string
          description: The version the model was created with (i.e. 1.9.0 or 0.8.2)
      description: Model framework and version that the original model was created
        with.
    modelRuntime:
      type: object
      properties:
        dependencies:
          type: array
          description: A list of dependencies based on the target deployment platform
            (i.e. cloud, edge, etc)
          items:
            $ref: '#/components/schemas/modelDependencies'
      description: Runtime dependencies needed in order to run the model. This is
        a list of dependencies that may differ depending on the target deployment
        platform.
    modelDependencies:
      type: object
      properties:
        platform:
          type: string
          description: Supported values are - python, r.
          example: python
      description: Model dependencies based on the target running platform (cloud
        or edge).
    serviceApi:
      required:
      - api
      type: object
      properties:
        api:
          type: string
          description: Service API that can be used for creating a solution. Supported
            values are - analyze, analyze_text, classify, custom, detect_faces, detect_objects,
            detect_speech, detect_text, predict, transform, translate.
          example: predict
        customApi:
          type: string
          description: String name of the API being built in the case where api=custom
            is not bound to a Dori provided service API.
      description: Service API.
