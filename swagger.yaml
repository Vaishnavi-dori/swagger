          description: Unique ID assigned by the Dori Platform given to each eval
            job request. (GUID)
        modelSize:
          type: integer
          description: Size of the model in bytes.
          format: int64
        numFlops:
          type: integer
          description: Number of FLOPS (floating point operations) of the model.
          format: int32
        numLayers:
          type: integer
          description: Number of layers of the model.
          format: int32
        meanAveragePrecision:
